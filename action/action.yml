name: "storysync"
description: "Sync Storybook components to Figma. Reads from Storybook MCP, writes to Figma MCP."
author: "Brendan Ciccone"

branding:
  icon: "refresh-cw"
  color: "purple"

inputs:
  storybook_url:
    description: "URL of the running Storybook instance"
    required: true
  figma_file_key:
    description: "Figma file key to write components into"
    required: true
  figma_token:
    description: "Figma personal access token"
    required: true
  page_name:
    description: "Figma page name for synced components"
    required: false
    default: "storysync"
  components:
    description: "Comma-separated list of component names to sync (default: all)"
    required: false
  no_screenshots:
    description: "Skip capturing screenshots"
    required: false
    default: "false"
  viewport_width:
    description: "Screenshot viewport width"
    required: false
    default: "800"
  viewport_height:
    description: "Screenshot viewport height"
    required: false
    default: "600"
  node_version:
    description: "Node.js version to use"
    required: false
    default: "20"

outputs:
  components_synced:
    description: "Number of components successfully synced"
  components_failed:
    description: "Number of components that failed to sync"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install Playwright
      shell: bash
      run: npx playwright install chromium --with-deps

    - name: Run storysync
      shell: bash
      env:
        FIGMA_ACCESS_TOKEN: ${{ inputs.figma_token }}
      run: |
        ARGS="--storybook ${{ inputs.storybook_url }} --figma-file ${{ inputs.figma_file_key }} --page ${{ inputs.page_name }}"

        if [ "${{ inputs.no_screenshots }}" = "true" ]; then
          ARGS="$ARGS --no-screenshots"
        fi

        if [ -n "${{ inputs.components }}" ]; then
          ARGS="$ARGS --components ${{ inputs.components }}"
        fi

        ARGS="$ARGS --viewport-width ${{ inputs.viewport_width }} --viewport-height ${{ inputs.viewport_height }}"

        npx storysync generate $ARGS
